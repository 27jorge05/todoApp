<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="styless.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <div class="app">
        <aside class="sidebarToggle">
            <button type="button" class="sidebar">
                Menu
            </button>
            <nav class="sidebarMenu">
                <button type="button" class="createTaskButton">+ Crear Tarea</button>
                <button type="button" class="createCategoryButton">+ Crear Categoria</button>
            </nav>
            <section class="categories">
                <h2>categorias</h2>
                <ul class="categoryList">
                    <li>
                        <button type="button" class="categoryButton categorybutton-active">general</button>
                    </li>
                </ul>
            </section>
        </aside>

        <main class="tasks">
            <header class="tasksHeader">
                <h1>ToDo List</h1>
            </header>
            <section class="tasksList">
                <p class="emptyMessage">
                    Todavía no tienes tareas.
                </p>
            </section>
        </main>
    </div>
    <dialog id="taskModal" class="modal">
        <form id="taskForm" class="modalForm">
            <h2>Crear tarea</h2>

            <label for="taskTitle">Título</label>
            <input id="taskTitle" name="title" type="text" required>

            <label for="taskDescription">Descripción</label>
            <textarea id="taskDescription" name="description"></textarea>

            <label for="taskCategory">Categoría</label>
            <select id="taskCategory" name="category">
                <option value="general">General</option>
            </select>

            <div class="modalActions">
                <button id="cancelTask" type="button">
                    Cancelar
                </button>

                <button type="submit">
                    Guardar
                </button>
            </div>
        </form>
    </dialog>
    <dialog id="categoryModal" class="modal">
        <form id="categoryForm" class="modalForm">
            <h2>Crear categoría</h2>

            <label for="categoryName">Nombre</label>
            <input id="categoryName" name="name" type="text" required>

            <div class="modalActions">
                <button id="cancelCategory" type="button">
                    Cancelar
                </button>

                <button type="submit">
                    Guardar
                </button>
            </div>
        </form>
    </dialog>
    <script src="script.js"></script>
</body>


</html>
